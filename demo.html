<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Copywriting Transformer</title>
  <style>
    body { 
      font-family: 'Inter', sans-serif; margin: 0; padding: 20px; min-height: 100vh;
      display: flex; justify-content: center; align-items: center;
      background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
    }
    .container { 
      max-width: 600px; width: 100%;
      background: white; border-radius: 20px; padding: 40px; 
      box-shadow: 0 10px 40px rgba(0,0,0,0.1); color: #333;
    }
    h1 { text-align: center; color: #1a1a1a; margin-top: 0; }
    .input-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; }
    input, select { 
      width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc;
      box-sizing: border-box; font-size: 16px;
    }
    button { 
      width: 100%; background: #4facfe; color: white; border: none; 
      padding: 14px 20px; cursor: pointer; border-radius: 10px; 
      font-size: 16px; font-weight: bold; margin-top: 10px;
    }
    .result { 
      margin-top: 30px; padding: 20px; background: #f8f9fa; 
      border-radius: 10px; min-height: 100px; white-space: pre-wrap;
      border: 1px solid #eee; display: none;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>✍️ Copywriting Transformer</h1>
  
  <div class="input-group">
    <label>Google Gemini API Key</label>
    <input type="password" id="apiKey" placeholder="Enter your free Gemini API Key...">
  </div>

  <div class="input-group">
    <label>Product Name</label>
    <input type="text" id="productName" placeholder="e.g. Smart Coffee Mug">
  </div>

  <div class="input-group">
    <label>Product Description</label>
    <input type="text" id="productDesc" placeholder="Keeps coffee hot for 12 hours">
  </div>

  <div class="input-group">
    <label>Platform</label>
    <select id="platform">
      <option value="linkedin">LinkedIn Post</option>
      <option value="twitter">Twitter / X</option>
      <option value="email">Email Campaign</option>
    </select>
  </div>

  <div class="input-group">
    <label>Tone</label>
    <select id="tone">
      <option value="professional">Professional</option>
      <option value="casual">Casual & Fun</option>
      <option value="urgent">Urgent / Salesy</option>
    </select>
  </div>
  
  <button onclick="generateCopy()">Generate Copy</button>

  <div class="result" id="resultArea"></div>
</div>

<script>
  async function generateCopy() {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) {
      alert("Please enter your Gemini API Key!"); return;
    }

    const name = document.getElementById('productName').value;
    const desc = document.getElementById('productDesc').value;
    const platform = document.getElementById('platform').value;
    const tone = document.getElementById('tone').value;
    const resultArea = document.getElementById('resultArea');

    if (!name || !desc) {
      alert("Please fill in product details!"); return;
    }

    resultArea.style.display = 'block';
    resultArea.innerHTML = "<em>Generating your copy...</em>";

    const prompt = `You are an expert copywriter. Write a ${tone} ${platform} post for a product called '${name}'. Description: '${desc}'.`;
    
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
    
    try {
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
      });
      
      const data = await response.json();
      
      if (!response.ok) {
        resultArea.innerHTML = `<span style="color:red">Error: ${data.error.message}</span>`;
        return;
      }
      
      const text = data.candidates[0].content.parts[0].text;
      resultArea.textContent = text;

    } catch (e) {
      resultArea.innerHTML = `<span style="color:red">Failed to connect to Gemini API.</span>`;
    }
  }
</script>
</body>
</html>
